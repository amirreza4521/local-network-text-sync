 author: a human developer :)
 description: simple dark-mode text sync interface with live updates
 ------------------------------------------------ -->
<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<title>صفحه‌ی همگام‌سازی متن</title>

<!-- import Socket.IO client library (comes from Flask-SocketIO server locally) -->
<script src="/socket.io/socket.io.js"></script>

<style>
    body {
        background-color: #121212;
        color: #e0e0e0;
        font-family: "Vazirmatn", sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        flex-direction: column;
    }
    textarea {
        width: 80%;
        height: 200px;
        background-color: #1e1e1e;
        color: #fff;
        border: 1px solid #333;
        border-radius: 8px;
        padding: 10px;
        font-size: 16px;
        resize: none;
    }
    button {
        margin: 10px;
        padding: 8px 18px;
        background-color: #333;
        color: #fff;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        transition: 0.3s;
    }
    button:hover {
        background-color: #555;
    }
</style>
</head>
<body>

<h2>📝 همگام‌سازی متن بین دستگاه‌ها</h2>
<textarea id="sharedText" placeholder="هر متنی بنویس، بلافاصله در گوشی هم می‌بینی!"></textarea>
<div>
    <button id="copyBtn">Copy</button>
    <button id="resetBtn">Reset</button>
</div>

<script>
    // connect to backend (auto connects to same host)
    const socket = io();

    const textArea = document.getElementById('sharedText');
    const copyBtn = document.getElementById('copyBtn');
    const resetBtn = document.getElementById('resetBtn');

    // when user types, send update to server
    textArea.addEventListener('input', () => {
        socket.emit('update_text', { text: textArea.value });
    });

    // when server broadcasts new text, update locally
    socket.on('sync_text', (data) => {
        // avoid infinite loop: update only if values differ
        if (textArea.value !== data.text) {
            textArea.value = data.text;
        }
    });

    // reset button clears text globally
    resetBtn.addEventListener('click', () => {
        socket.emit('reset_text');
    });

    // copy button copies current text
    copyBtn.addEventListener('click', () => {
        navigator.clipboard.writeText(textArea.value);
        copyBtn.textContent = "✅ Copied!";
        setTimeout(() => copyBtn.textContent = "Copy", 1500);
    });
</script>

</body>
</html>
